<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://aquilastech.com/guardhouse/api/timezones', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Referer': 'https://aquilastech.com'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<h3>✅ API Working!</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    resultDiv.innerHTML = '<h3>❌ API Error</h3><p>Status: ' + response.status + '</p><p>' + await response.text() + '</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<h3>❌ Connection Error</h3><p>' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
